version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: reserva_epo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: reserva_epo
      POSTGRES_USER: epo_user
      POSTGRES_PASSWORD: epo_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epo_user -d reserva_epo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reserva_epo_backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reserva_epo_frontend
    restart: unless-stopped
    ports:
      - "7000:80"
    depends_on:
      - backend

volumes:
  pgdata:
